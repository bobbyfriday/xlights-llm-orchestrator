# Per-role model routing. Pick the provider with `default_provider` or the XLO_PROVIDER
# env var (no code change). Each role lists a model per provider. IDs are bare.
default_provider: anthropic   # override at runtime with XLO_PROVIDER=gemini

roles:
  director:                                   # show planner (planner tier)
    anthropic: {model: claude-opus-4-8, thinking: adaptive, effort: high}
    gemini:    {model: gemini-3.1-pro-preview}
  generator:                                  # per-section effects (worker tier)
    anthropic: {model: claude-sonnet-4-6, thinking: adaptive}
    gemini:    {model: gemini-3.1-flash-lite}   # re-run the comparison with `xlo ab` (F-H harness)
  analyst:                                    # parallel song analysts (worker tier)
    anthropic: {model: claude-sonnet-4-6, thinking: adaptive}
    gemini:    {model: gemini-3.1-flash-lite}
  classifier:                                 # F-E: layout-onboarding unresolved-tail fallback (worker tier)
    anthropic: {model: claude-sonnet-4-6, thinking: adaptive}
    gemini:    {model: gemini-3.1-flash-lite}
  synthesizer:                                # fuses analyst outputs → MusicBrief (planner)
    anthropic: {model: claude-opus-4-8, thinking: adaptive, effort: high}
    gemini:    {model: gemini-3.1-pro-preview}
  judge:                                      # scores the draft + scoped revisions (planner)
    anthropic: {model: claude-opus-4-8, thinking: adaptive, effort: high}
    gemini:    {model: gemini-3.5-flash}      # scoring a structured QA report ≠ pro-tier work
  visual_critic:                              # multimodal: looks at rendered frames (planner/vision)
    anthropic: {model: claude-opus-4-8, thinking: adaptive, effort: high}
    gemini:    {model: gemini-3.1-pro-preview}

  visual_critic_lite:                         # cheap contact-sheet critique (worker tier, I8 Tier 1)
    anthropic: {model: claude-sonnet-4-6, thinking: adaptive}
    gemini:    {model: gemini-3.1-flash-lite}

# Provider → PydanticAI model-string prefix. ('google:' replaces the deprecated 'google-gla:')
providers:
  anthropic: "anthropic:"
  gemini: "google:"

# Token prices, USD per 1,000,000 tokens, keyed by BARE model id (a price is a property of a
# model, not a role). Source: Anthropic public pricing (2025-Q4). Cache-read = 0.1× input,
# cache-write = 1.25× input per Anthropic's prompt-caching rate card. A model absent from this
# table makes the derived run cost UNKNOWN (None) — never zero, never a guess. Add rows to
# re-price without a code change.
pricing:
  claude-opus-4-8:   {input: 5.00, output: 25.00, cache_read: 0.50, cache_write: 6.25}
  claude-sonnet-4-6: {input: 3.00, output: 15.00, cache_read: 0.30, cache_write: 3.75}
  # Gemini: Google's published rates (ai.google.dev/gemini-api/docs/pricing, 2026), STANDARD tier at
  # the ≤200k-context price. Pro doubles above 200k (input 4.00 / output 18.00) — not modeled here;
  # our calls are well under 200k. Google bills context cache as storage-per-hour, not a per-token
  # write like Anthropic, so `cache_write` is that hourly storage rate (unused: our cache_write is 0).
  gemini-3.1-pro-preview:  {input: 2.00, output: 12.00, cache_read: 0.20,  cache_write: 4.50}
  gemini-3.1-flash-lite:   {input: 0.25, output: 1.50,  cache_read: 0.025, cache_write: 1.00}
  gemini-3.5-flash:        {input: 1.50, output: 9.00,  cache_read: 0.15,  cache_write: 1.00}
