[project]
name = "xlights-mcp"
version = "0.1.0"
description = "MCP server exposing xLights read operations as tools."
requires-python = ">=3.11"
dependencies = [
    "xlights-core",
    "mcp[cli]>=1.2",
]

# Audio tools work only when the audio stack is installed; opt in with xlights-mcp[audio].
[project.optional-dependencies]
audio = ["xlights-core[audio]"]

[project.scripts]
xlights-mcp = "xlights_mcp.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/xlights_mcp"]

[tool.uv.sources]
xlights-core = { workspace = true }
