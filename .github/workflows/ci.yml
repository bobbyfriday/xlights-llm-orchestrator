name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ffmpeg is a system binary the preview/real-render tests shell out to.
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      # Base + dev group (pytest/ruff/mypy) + the preview extra (numpy/zstandard/
      # pillow). librosa/soundfile back the audio tests; we install them directly
      # rather than via the `audio` extra to skip the heavy, build-from-source vamp.
      - name: Install dependencies
        run: |
          uv sync --extra preview
          uv pip install librosa soundfile

      - name: Lint (ruff)
        run: uv run ruff check

      - name: Test (pytest)
        run: uv run --no-sync pytest

      # Type checking is a HARD GATE: mypy must pass clean or the job fails.
      # Canonical local invocation: `uv sync --extra preview && uv run --no-sync mypy`
      # (the `Install dependencies` step above provides that environment).
      - name: Type check (mypy)
        run: uv run --no-sync mypy
