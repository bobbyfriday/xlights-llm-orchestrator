# uv workspace root (virtual — no root package).
# Members are the installable packages under packages/.
# (Each member declares its own [tool.uv.sources] for intra-workspace deps.)
[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = ["pytest>=8", "ruff>=0.6", "mypy>=1.11", "types-PyYAML"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-m 'not live'"
markers = ["live: requires a running xLights instance (opt in with -m live)"]

# Lint (pyflakes + pycodestyle errors). Formatting is intentionally NOT enforced:
# the source uses a deliberately compact, column-aligned style (paired statements,
# alignment comments) that `ruff format` would rewrite across most files.
[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
# Default select (E4/E7/E9, F) minus the compact-style rules the codebase chooses
# on purpose: E702 (paired statements via `;`), E731 (assigned lambdas),
# E741 (short names like `l` in tight comprehensions).
ignore = ["E702", "E731", "E741"]

[tool.ruff.lint.per-file-ignores]
# Tests group fixtures into labelled sections, so imports follow the code they support.
"tests/*" = ["E402"]

# Type checking is a HARD CI gate (see .github/workflows/ci.yml): the codebase is
# fully annotated and mypy must pass clean on every PR. Third-party libs without
# stubs are ignored (ignore_missing_imports). The warn_* flags keep the annotation
# hygiene honest — a redundant cast or a now-unnecessary `# type: ignore` fails the
# gate rather than rotting; check_untyped_defs type-checks helper bodies too.
[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
warn_unused_ignores = true
warn_redundant_casts = true
check_untyped_defs = true
files = ["packages"]
